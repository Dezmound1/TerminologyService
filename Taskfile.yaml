version: '3'

tasks:
  help:
    desc: Показать список команд
    cmds:
      - task --list-all

  install:
    desc: Установить зависимости через uv
    cmds:
      - uv sync

  build:
    desc: Собрать docker-образ приложения
    cmds:
      - docker compose build

  up:
    desc: Поднять postgres и приложение
    cmds:
      - docker compose up -d
      - echo "API - http://localhost:8000"
      - echo "Swagger - http://localhost:8000/api/schema/swagger-ui/"
      - echo "Admin - http://localhost:8000/admin/"

  down:
    desc: Остановить контейнеры
    cmds:
      - docker compose down

  test:
    desc: Запустить все тесты
    cmds:
      - docker compose exec app uv run pytest

  test-unit:
    desc: Только юнит-тесты (без БД)
    cmds:
      - uv run pytest refbooks/tests/unit -v

  test-integration:
    desc: Только интеграционные тесты (нужен поднятый postgres)
    cmds:
      - docker compose exec app uv run pytest refbooks/tests/integration -v

  lint:
    desc: Запустить ruff
    cmds:
      - uv run ruff check .

  format:
    desc: Отформатировать код
    cmds:
      - uv run ruff format .

  type-check:
    desc: Проверить типы через basedpyright
    cmds:
      - uv run basedpyright
